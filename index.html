<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate">

    <meta
        http-equiv="Pragma"
        content="no-cache">

    <meta
        http-equiv="Expires"
        content="0">

    <title>Salvad Café Digital Signage</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {

            width: 100%;
            height: 100%;

            overflow: hidden;

            background: #000;

            font-family: Arial, Helvetica, sans-serif;

        }

        #player {

            position: fixed;

            top: 0;
            left: 0;

            width: 100vw;
            height: 100vh;

            overflow: hidden;

            background: #000;

            display: flex;

            justify-content: center;
            align-items: center;

        }

        .loading {

            color: white;

            font-size: 2rem;

            text-align: center;

        }

        img,
        video {

            max-width: 100%;
            max-height: 100%;

            object-fit: contain;

            user-select: none;

            -webkit-user-select: none;

            pointer-events: none;

        }

    </style>

</head>

<body>

    <div id="player">

        <div class="loading">
            Cargando contenido...
        </div>

    </div>

    <noscript>

        <div
            style="
                color:white;
                background:black;
                width:100vw;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                text-align:center;
                font-size:2rem;
            ">
            Debe habilitar JavaScript para utilizar esta aplicación.
        </div>

    </noscript>

    <script src="js/player.js"></script>

</body>

</html>
